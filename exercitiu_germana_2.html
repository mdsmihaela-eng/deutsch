<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercițiu de traducere A1–A2 – Mihaela Preda</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f0e8; color: #2d2d2d; min-height: 100vh; }
  .header { background: #2d5a3d; color: white; padding: 18px 24px 14px; }
  .header .tag { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #a8d5b5; margin-bottom: 4px; }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .header .author { font-size: 13px; color: #c8e6d0; }
  .container { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }
  .instructions { background: #fef9ec; border: 1px solid #e8d98a; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; font-size: 13.5px; line-height: 1.9; color: #4a3f1a; }
  .instructions span.ro { color: #c0392b; font-weight: 600; }
  .instructions span.de { color: #2d5a3d; font-weight: 600; }
  .instructions span.btn-ref { background: #2d5a3d; color: white; padding: 1px 7px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .speed-box { background: #fef9ec; border: 1px solid #e8d98a; border-radius: 8px; padding: 12px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #4a3f1a; }
  .speed-label { font-weight: 600; }
  .speed-btn { padding: 5px 16px; border-radius: 20px; border: 1.5px solid #c8b86a; background: transparent; color: #4a3f1a; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .speed-btn.active { background: #e8a020; border-color: #e8a020; color: white; font-weight: 600; }
  .show-all-btn { border: 1.5px solid #2d5a3d; background: transparent; color: #2d5a3d; padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; font-weight: 500; transition: all 0.15s; }
  .show-all-btn:hover { background: #eaf5ee; }
  .exercise-list { display: flex; flex-direction: column; gap: 0; }
  .exercise-item { padding: 16px 0; border-bottom: 1px solid #d8cdb0; }
  .exercise-item:last-child { border-bottom: none; }
  .ro-sentence { font-size: 15.5px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.5; }
  .toggle-btn { background: none; border: none; color: #c0701a; font-size: 13px; cursor: pointer; padding: 0; font-weight: 500; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
  .toggle-btn:hover { color: #8a4a0a; }
  .de-answer { display: none; margin-top: 8px; background: #2d5a3d; color: white; border-radius: 8px; padding: 12px 16px 12px 18px; font-size: 15px; font-weight: 500; line-height: 1.5; align-items: center; justify-content: space-between; gap: 10px; }
  .de-answer.visible { display: flex; }
  .de-text { flex: 1; }
  .audio-btn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s; color: white; font-size: 16px; }
  .audio-btn:hover { background: rgba(255,255,255,0.28); }
  .audio-btn.playing { background: rgba(255,255,255,0.35); }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #7a6a40; margin: 24px 0 8px; padding-bottom: 4px; border-bottom: 1.5px solid #d8cdb0; }
</style>
</head>
<body>

<div class="header">
  <div class="tag">Deutsch, meine Sprache</div>
  <h1>Exercițiu de traducere A1–A2</h1>
  <div class="author">Mihaela Preda</div>
</div>

<div class="container">
  <div class="instructions">
    1. Citește propoziția în <span class="ro">română</span>.<br>
    2. Încearcă să o traduci în <span class="de">germană</span>.<br>
    3. Apasă <span class="btn-ref">Arată germana</span> pentru a verifica.<br>
    4. Apasă ▶ pentru a auzi pronunția corectă.
  </div>

  <div class="speed-box">
    <span class="speed-label">Viteză sonor:</span>
    <button class="speed-btn active" onclick="setSpeed(0.7, this)">Lent</button>
    <button class="speed-btn" onclick="setSpeed(1.0, this)">Normal</button>
    <button class="speed-btn" onclick="setSpeed(1.3, this)">Rapid</button>
  </div>

  <button class="show-all-btn" onclick="toggleAll()">
    <span>👁</span> <span id="showAllLabel">Arată toate traducerile</span>
  </button>

  <div class="exercise-list" id="exerciseList"></div>
</div>

<script>
const exercises = [

  // ── waschen / spülen / abwaschen
  { section: "waschen / spülen / abwaschen — a spăla" },
  { ro: "Spăl merele înainte de masă.", de: "Ich wasche die Äpfel vor dem Essen." },
  { ro: "Mama spală hainele în fiecare luni.", de: "Mama wäscht die Kleider jeden Montag." },
  { ro: "Clătești vasele, te rog?", de: "Spülst du bitte das Geschirr?" },


  { ro: "Mașina de spălat rufe este în baie.", de: "Die Waschmaschine ist im Badezimmer." },
  { ro: "Mașina de spălat vase este stricată.", de: "Die Spülmaschine ist kaputt." },

  // ── schneiden / reiben / backen / grillen
  { section: "schneiden / reiben / backen / grillen" },
  { ro: "Ea taie morcovii.", de: "Sie schneidet die Karotten." },
  { ro: "Rad brânza pe o farfurie.", de: "Ich reibe den Käse auf einen Teller." },
  { ro: "Îmi frec mâinile de frig.", de: "Ich reibe meine Hände vor Kälte." },
  { ro: "Coc un tort pentru ziua ei.", de: "Ich backe eine Torte für ihren Geburtstag." },
  { ro: "Facem grătar duminica.", de: "Wir grillen am Sonntag." },

  // ── kochen / rühren / würzen / dämpfen
  { section: "kochen / rühren / würzen / dämpfen" },
  { ro: "Gătesc pentru familie.", de: "Ich koche für die Familie." },
  { ro: "Amestec bine sosul.", de: "Ich rühre die Soße gut um." },
  { ro: "Condimentez carnea cu boia.", de: "Ich würze das Fleisch mit Paprika." },
  { ro: "Gătim peștele la abur.", de: "Wir dämpfen den Fisch." },

  // ── der Braten / der Ofen / öffnen
  { section: "der Braten / der Ofen / öffnen" },
  { ro: "Friptura miroase extraordinar.", de: "Der Braten riecht wunderbar." },
  { ro: "Cuptorul este foarte fierbinte.", de: "Der Ofen ist sehr heiß." },



  // ── möchten / wollen / sollen
  { section: "möchten / wollen / sollen" },
  { ro: "Vrei puțină supă?", de: "Möchtest du etwas Suppe?" },
  { ro: "Să-ți tai pâinea?", de: "Soll ich dir das Brot schneiden?" },
  { ro: "Să condimentez carnea?", de: "Soll ich das Fleisch würzen?" },
  { ro: "Să-ți aduc ceva de băut?", de: "Soll ich dir etwas zu trinken bringen?" },

  { ro: "Ce să pregătesc pentru mâine?", de: "Was soll ich für morgen vorbereiten?" },

  // ── helfen
  { section: "helfen — a ajuta" },

  { ro: "Vă ajut cu plăcere.", de: "Ich helfe Ihnen gerne." },
  { ro: "Ea ajută mereu în bucătărie.", de: "Sie hilft immer in der Küche." },
  { ro: "Copiii ajută la masă.", de: "Die Kinder helfen beim Essen." },

  // ── vocabular — substantive
  { section: "Vocabular — substantive" },
  { ro: "Soțul meu gătește bine.", de: "Mein Mann kocht gut." },
  { ro: "Soția mea face prăjituri bune.", de: "Meine Frau backt gute Kuchen." },
  { ro: "Friptura este gata.", de: "Der Braten ist fertig." },
  { ro: "Morcovii sunt proaspeți.", de: "Die Karotten sind frisch." },
  { ro: "Condimentele sunt în dulap.", de: "Die Gewürze sind im Schrank." },
  { ro: "Rufele sunt curate.", de: "Die Wäsche ist sauber." },

  // ── expresii utile
  { section: "Expresii utile" },
  { ro: "Totul este în regulă!", de: "Alles klar!" },
  { ro: "Ce gătești acum?", de: "Was kochst du jetzt?" },

  { ro: "Sunt sigur.", de: "Ich bin sicher." },
];

let speed = 0.7;
let allVisible = false;

function setSpeed(s, btn) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function speak(text, btn) {
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  utter.rate = speed;
  const voices = window.speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de') && v.name.toLowerCase().includes('google'))
    || voices.find(v => v.lang.startsWith('de'));
  if (deVoice) utter.voice = deVoice;
  btn.classList.add('playing');
  utter.onend = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(utter);
}

function toggleAnswer(id) {
  const ans = document.getElementById('ans-' + id);
  const btn = document.getElementById('btn-' + id);
  const visible = ans.classList.contains('visible');
  ans.classList.toggle('visible', !visible);
  btn.textContent = visible ? 'Arată germana' : 'Ascunde germana';
}

function toggleAll() {
  allVisible = !allVisible;
  document.querySelectorAll('.de-answer').forEach(el => el.classList.toggle('visible', allVisible));
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.textContent = allVisible ? 'Ascunde germana' : 'Arată germana';
  });
  document.getElementById('showAllLabel').textContent = allVisible ? 'Ascunde toate traducerile' : 'Arată toate traducerile';
}

function buildList() {
  const list = document.getElementById('exerciseList');
  let idx = 0;
  exercises.forEach(ex => {
    if (ex.section) {
      const div = document.createElement('div');
      div.className = 'section-title';
      div.textContent = ex.section;
      list.appendChild(div);
      return;
    }
    const id = idx++;
    const item = document.createElement('div');
    item.className = 'exercise-item';
    item.innerHTML = `
      <div class="ro-sentence">${ex.ro}</div>
      <button class="toggle-btn" id="btn-${id}" onclick="toggleAnswer(${id})">Arată germana</button>
      <div class="de-answer" id="ans-${id}">
        <div class="de-text">${ex.de}</div>
        <button class="audio-btn" onclick="speak('${ex.de.replace(/'/g,"\\'")}', this)" title="Ascultă pronunția">▶</button>
      </div>
    `;
    list.appendChild(item);
  });
}

buildList();
</script>
</body>
</html>
